<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Urban Gliding Hyderabad</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&family=JetBrains+Mono:wght@700&family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 3 Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'vintage-cream': '#fdf9f3',
                        'deep-teal': '#00615f',
                        'burnt-orange': '#E67E22',
                        'rust': '#97381d',
                        'keyline': '#1c1c18',
                    },
                    fontFamily: {
                        serif: ['"Libre Caslon Text"', 'serif'],
                        sans: ['"Geist"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    borderRadius: {
                        'collector': '32px',
                    },
                    borderWidth: {
                        '3': '3px',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-vintage-cream text-keyline font-sans selection:bg-burnt-orange selection:text-white antialiased;
            }
        }

        @layer components {
            .btn-tactical {
                @apply transition-all duration-200 border-3 border-keyline active:scale-95 px-6 py-3 rounded-full font-mono text-xs uppercase tracking-[2px];
                box-shadow: 4px 4px 0 #1c1c18;
            }
            .btn-tactical:hover {
                @apply -translate-x-1 -translate-y-1;
                box-shadow: 8px 8px 0 #E67E22;
            }
            
            .card-tactical {
                @apply transition-all duration-300 border-4 border-keyline rounded-collector bg-vintage-cream;
            }
            .card-tactical:hover {
                @apply -translate-x-1 -translate-y-1;
                box-shadow: 8px 8px 0 #00615f;
            }

            .nav-link {
                @apply font-serif text-lg font-semibold hover:text-burnt-orange transition-colors tracking-[1px];
            }

            .fade-in {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            }
            .fade-in.visible {
                opacity: 1;
                transform: translateY(0);
            }
            
            .glass-menu {
                @apply bg-vintage-cream/90 backdrop-blur-xl border-b-4 border-keyline;
            }
        }
    </style>
</head>
<body>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K2PYP4J4DZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-K2PYP4J4DZ');
    </script>

    <nav class="sticky top-0 z-50 bg-vintage-cream/80 backdrop-blur-md border md:border-b-3 border-keyline">
        <div class="max-w-7xl mx-auto px-6 h-16 md:h-24 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="index.html" class="font-serif text-2xl md:text-4xl font-bold text-deep-teal block transition-transform hover:scale-105 active:scale-95">UGH</a>
            </div>

            <div class="hidden md:flex items-center gap-12">
                <a href="index.html#programs" class="nav-link">Programs</a>
                <a href="leaderboard.html" class="nav-link">Summer Camp</a>
                <a href="about.html" class="nav-link !text-burnt-orange">About</a>
                <button onclick="handleTrial()" class="bg-burnt-orange text-white btn-tactical !px-8 !py-4">
                    Secure Your Spot
                </button>
            </div>

            <button class="md:hidden p-2 bg-burnt-orange text-white rounded-xl border-3 border-keyline shadow-[3px_3px_0_#1c1c18]" onclick="toggleMenu()">
                <i data-lucide="menu" id="menu-icon" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-40 glass-menu pt-32 px-6 md:hidden hidden flex-col gap-10 items-center">
        <a href="index.html#programs" onclick="toggleMenu()" class="font-serif text-4xl font-bold tracking-[1px]">Programs</a>
        <a href="leaderboard.html" onclick="toggleMenu()" class="font-serif text-4xl font-bold tracking-[1px]">Summer Camp</a>
        <a href="about.html" onclick="toggleMenu()" class="font-serif text-4xl font-bold tracking-[1px] !text-burnt-orange">About</a>
        <button onclick="handleTrial()" class="w-full bg-burnt-orange text-white btn-tactical !py-6 mt-6">
            Secure Your Spot
        </button>
    </div>

    <main>
        <section class="py-24 px-6 md:py-40">
            <div class="max-w-5xl mx-auto">
                <div class="mb-24 fade-in">
                    <span class="font-mono text-xs uppercase tracking-[5px] text-burnt-orange mb-8 block font-bold">The Tactical Mission</span>
                    <h1 class="font-serif text-5xl md:text-8xl font-bold mb-12 leading-[1.05] tracking-tight">Mastering the<br><span class="text-deep-teal italic">Concrete Waves.</span></h1>
                    <p id="about-description" class="font-sans text-2xl md:text-4xl text-keyline/70 leading-relaxed italic border-l-8 md:border-l-[12px] border-deep-teal pl-10 md:pl-16 shadow-sm">
                        <!-- Injected -->
                    </p>
                </div>

                <div class="mb-40 fade-in">
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-20">
                        <div class="flex flex-col">
                            <span class="font-mono text-[10px] uppercase tracking-[4px] text-burnt-orange mb-4">Phase 1 - 3</span>
                            <h2 class="font-serif text-4xl md:text-6xl font-bold flex items-center gap-5">
                                <i data-lucide="shield-check" class="text-burnt-orange w-12 h-12"></i>
                                Summer Camp Curriculum
                            </h2>
                        </div>
                        <div class="h-2 flex-grow bg-keyline hidden md:block mx-12 rounded-full opacity-5"></div>
                    </div>
                    <div id="curriculum-container" class="grid grid-cols-1 md:grid-cols-3 gap-12">
                        <!-- Injected -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-keyline text-white py-32 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-16">
            <div class="text-center md:text-left">
                <h2 class="font-serif text-6xl font-bold mb-6 italic">UGH</h2>
                <p class="font-mono text-[11px] uppercase tracking-[4px] text-white/20">Hyderabad · Concrete Dialogue</p>
            </div>
            <div class="flex gap-16">
                <a href="index.html" class="font-mono text-xs uppercase tracking-[3px] text-white/40 hover:text-white transition-all">Home</a>
                <a href="leaderboard.html" class="font-mono text-xs uppercase tracking-[3px] text-white/40 hover:text-white transition-all">Leaderboard</a>
                <a href="#" class="font-mono text-xs uppercase tracking-[3px] text-white/40 hover:text-white transition-all">Scroll Up</a>
            </div>
        </div>
    </footer>

    <script>
        const CONTENT = {
            "contact": { 
                "phone": "916304895686",
                "email": "worldwide.leelamadhav@gmail.com"
            },
            "whatsapp": { "freeTrialTemplate": "Hi Coach Leela, I want a free trial session." },
            "about": {
                "description": "Skateboarding is more than a sport; it's a tactical dialogue with urban architecture. We don't just teach skating; we master the concrete waves of Hyderabad.",
                "curriculum": [
                    {
                        "phase": "Phase 1",
                        "title": "Foundation",
                        "points": ["Static Balance & Stance", "Low-speed Push Mechanics", "Intro to Carving"]
                    },
                    {
                        "phase": "Phase 2",
                        "title": "Flow",
                        "points": ["Kickturns & Spacing", "Manual Dynamics", "Rough Terrain Management"]
                    },
                    {
                        "phase": "Phase 3",
                        "title": "Technical Mastery",
                        "points": ["Ollie Fundamentals", "Pop Over Obstacles", "Concave Utilization"]
                    }
                ]
            }
        };

        function handleTrial() {
            window.open(`https://wa.me/${CONTENT.contact.phone}?text=${encodeURIComponent(CONTENT.whatsapp.freeTrialTemplate)}`, "_blank");
        }

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            const isOpen = !menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
            icon.setAttribute('data-lucide', isOpen ? 'menu' : 'x');
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('about-description').innerText = CONTENT.about.description;
            const container = document.getElementById('curriculum-container');
            CONTENT.about.curriculum.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'card-tactical p-10 md:p-12 relative overflow-hidden group shadow-xl';
                el.innerHTML = `
                    <div class="absolute top-0 left-0 w-full h-2 bg-deep-teal transition-all group-hover:h-4"></div>
                    <span class="font-mono text-[11px] uppercase tracking-[4px] text-deep-teal/40 mb-4 block font-bold">MODULE 0${idx+1}</span>
                    <h3 class="font-serif text-3xl font-bold mb-10 group-hover:text-deep-teal transition-colors">${item.title}</h3>
                    <ul class="space-y-6">
                        ${item.points.map(p => `
                            <li class="flex items-start gap-4 text-base font-bold">
                                <i data-lucide="arrow-right" class="w-5 h-5 text-burnt-orange shrink-0 mt-0.5 group-hover:translate-x-1 transition-transform"></i>
                                <span>${p}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(el);
            });
            lucide.createIcons();
            document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
        });
    </script>
</body>
</html>
